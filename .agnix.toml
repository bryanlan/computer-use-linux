severity = "Warning"
target = "Generic"
exclude = [
  ".git/**",
  "target/**",
  "node_modules/**",
]

[rules]
skills = true
mcp = true
frontmatter_validation = true
cross_platform = true
disabled_rules = [
  "CC-SK-017", # Hermes supports version/author/platforms frontmatter.
  "XP-SK-001", # The skill is intentionally Linux/Hermes-specific.
  "VER-001", # This repo does not need tool version pinning for doc-only validation.
]
